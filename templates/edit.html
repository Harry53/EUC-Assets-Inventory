{% extends 'base.html' %}{% block content %}<section class="panel"><div class="panel-head"><h2>Edit {{ table }} #{{ row.id }}</h2><a class="secondary" href="{{ back_url or request.referrer or url_for('dashboard') }}">← Back</a></div><form method="post" class="form-grid">{% for col in columns %}<label>{{ labels.get(col, col) }}<input name="{{ col }}" value="{{ date_input_value(row[col]) if col in ['doj','eol','purchase_date','installation_date','expiry_date','last_updated_date'] else (row[col] or '') }}" {% if col in ['doj','eol','purchase_date','installation_date','expiry_date','last_updated_date'] %}type="date" pattern="\d{4}-\d{2}-\d{2}"{% endif %}></label>{% endfor %}<button class="wide">Submit for Approval / Update</button></form></section>{% endblock %}
