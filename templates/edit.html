{% extends 'base.html' %}{% block content %}<section class="panel"><h2>Edit {{ table }} #{{ row.id }}</h2><form method="post" class="form-grid">{% for col in columns %}<label>{{ labels.get(col, col) }}<input name="{{ col }}" value="{{ row[col] or '' }}" {% if 'date' in col or col in ['doj','eol','purchase_date'] %}type="date"{% endif %}></label>{% endfor %}<button class="wide">Update</button></form></section>{% endblock %}
