{% extends 'base.html' %}{% block content %}
<section class="admin-tabs"><a href="{{ url_for('admin') }}">🛡️ Users</a><a href="{{ url_for('admin_logs') }}">🪵 Logs</a><a href="{{ url_for('admin_db') }}">🗄️ DB Administration</a><a class="active" href="{{ url_for('admin_email') }}">✉️ Email Server</a></section>
<section class="grid-2"><div class="panel"><h2>Email Server Config</h2><form method="post" class="form-grid single"><input type="hidden" name="action" value="save"><label>SMTP Host<input name="smtp_host" value="{{ config.smtp_host if config else '' }}"></label><label>SMTP Port<input name="smtp_port" value="{{ config.smtp_port if config else '587' }}"></label><label>SMTP Username<input name="smtp_username" value="{{ config.smtp_username if config else '' }}"></label><label>SMTP Password<input type="password" name="smtp_password" value="{{ config.smtp_password if config else '' }}"></label><label>Sender Email<input type="email" name="sender_email" value="{{ config.sender_email if config else '' }}"></label><label><input type="checkbox" name="use_tls" {% if not config or config.use_tls %}checked{% endif %}> Use TLS</label><button>Save Config</button></form></div><div class="panel"><h2>Send Test Email</h2><form method="post" class="form-grid single"><input type="hidden" name="action" value="test"><label>Recipient<input type="email" name="test_recipient" required></label><button>Send Test</button></form></div></section>
<section class="panel"><h2>Mail Log</h2><div class="table-wrap limited"><table><thead><tr><th>Date</th><th>Recipient</th><th>Subject</th><th>Status</th></tr></thead><tbody>{% for l in logs %}<tr><td>{{ l.created_at }}</td><td>{{ l.recipient }}</td><td>{{ l.subject }}</td><td>{{ l.status }}</td></tr>{% endfor %}</tbody></table></div></section>
{% endblock %}
