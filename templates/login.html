<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Login</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body class="login-body"><form class="login-card" method="post"><h1>EUC Assets Inventory</h1><p>Encrypted password login. Default admin: <strong>admin/admin123</strong></p>{% with messages = get_flashed_messages(with_categories=true) %}{% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}{% endwith %}<label>Username<input name="username" required autofocus></label><label>Password<input name="password" type="password" required></label><button>Login</button></form></body></html>
